<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --primary-glow: rgba(0, 212, 255, 0.25);
    --bg: #0A0A0F;
    --bg-card: #111118;
    --bg-card2: #16161f;
    --text: #e8e8f0;
    --text-muted: #8888aa;
    --border: rgba(0, 212, 255, 0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -0.5px;
    text-decoration: none;
  }

  .nav-logo span { color: var(--text); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--primary); }

  .nav-cta {
    background: var(--primary);
    color: #000 !important;
    padding: 0.5rem 1.25rem;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.85rem !important;
  }

  .nav-cta:hover { background: var(--primary-dark) !important; color: #000 !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    display: inline-block;
    background: var(--primary);
    color: #000;
    font-weight: 700;
    font-size: 1rem;
    padding: 0.85rem 2rem;
    border-radius: 50px;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 0 24px var(--primary-glow);
    border: none;
    cursor: pointer;
  }

  .btn-primary:hover {
    background: var(--primary-dark);
    box-shadow: 0 0 36px rgba(0, 212, 255, 0.45);
    transform: translateY(-2px);
  }

  .btn-outline {
    display: inline-block;
    background: transparent;
    color: var(--primary);
    font-weight: 700;
    font-size: 1rem;
    padding: 0.85rem 2rem;
    border-radius: 50px;
    text-decoration: none;
    border: 2px solid var(--primary);
    transition: all 0.3s;
    cursor: pointer;
  }

  .btn-outline:hover {
    background: var(--primary-glow);
    transform: translateY(-2px);
  }

  /* ── SECTION WRAPPER ── */
  section { padding: 6rem 1.5rem; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-tag {
    display: inline-block;
    background: var(--primary-glow);
    color: var(--primary);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.35rem 1rem;
    border-radius: 50px;
    border: 1px solid var(--border);
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 1rem;
  }

  .section-title .highlight { color: var(--primary); }

  .section-subtitle {
    color: var(--text-muted);
    font-size: 1.1rem;
    max-width: 600px;
  }

  .text-center { text-align: center; }
  .text-center .section-subtitle { margin: 0 auto; }

  /* ── HERO ── */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-top: 5rem;
    position: relative;
    overflow: hidden;
  }

  #hero::before {
    content: '';
    position: absolute;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  .hero-badge .dot {
    width: 8px; height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .hero-title {
    font-size: clamp(2.5rem, 6vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 1.5rem;
    letter-spacing: -1px;
  }

  .hero-title .highlight { color: var(--primary); }

  .hero-desc {
    color: var(--text-muted);
    font-size: 1.15rem;
    margin-bottom: 2.5rem;
    line-height: 1.7;
  }

  .hero-btns {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 3rem;
  }

  .hero-stats {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; }

  .stat-num {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .hero-image-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .hero-image-wrap::before {
    content: '';
    position: absolute;
    inset: -30px;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-image-wrap img {
    width: 100%;
    max-width: 480px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(0,212,255,0.15);
    position: relative;
    z-index: 1;
    object-fit: cover;
    aspect-ratio: 4/3;
  }

  .hero-float-card {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.82rem;
    font-weight: 600;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 2;
    white-space: nowrap;
  }

  .hero-float-card .icon { font-size: 1.2rem; }

  .float-1 { bottom: 20px; left: -10px; }
  .float-2 { top: 20px; right: -10px; }

  /* ── PROBLEM ── */
  #problem { background: var(--bg-card); }

  .problem-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .problem-card {
    background: var(--bg);
    border: 1px solid rgba(255,80,80,0.15);
    border-radius: var(--radius);
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  .problem-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff5050, #ff8800);
  }

  .problem-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    display: block;
  }

  .problem-card h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .problem-card p {
    color: var(--text-muted);
    font-size: 0.92rem;
    line-height: 1.6;
  }

  /* ── SOLUTION ── */
  .solution-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    margin-top: 3rem;
  }

  .solution-steps { display: flex; flex-direction: column; gap: 1.5rem; }

  .step {
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
  }

  .step-num {
    flex-shrink: 0;
    width: 44px; height: 44px;
    background: var(--primary-glow);
    border: 1px solid var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    color: var(--primary);
    font-size: 1rem;
  }

  .step-content h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.35rem;
  }

  .step-content p {
    color: var(--text-muted);
    font-size: 0.92rem;
  }

  .solution-visual {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 1.5rem;
  }

  .nfc-ring {
    position: relative;
    width: 150px; height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nfc-ring::before, .nfc-ring::after {
    content: '';
    position: absolute;
    border: 2px solid var(--primary);
    border-radius: 50%;
    animation: ripple 2.5s linear infinite;
  }

  .nfc-ring::before { width: 100%; height: 100%; opacity: 0.3; }
  .nfc-ring::after { width: 70%; height: 70%; opacity: 0.6; animation-delay: 0.8s; }

  @keyframes ripple {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(1.2); opacity: 0; }
  }

  .nfc-inner {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    z-index: 1;
    position: relative;
    box-shadow: 0 0 30px rgba(0,212,255,0.4);
  }

  .solution-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    width: 100%;
  }

  .metric {
    background: var(--bg);
    border: 1px
