<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --primary-glow: rgba(0, 212, 255, 0.15);
    --bg: #0A0A0F;
    --bg-card: #12121A;
    --bg-card2: #1A1A26;
    --text: #F0F0F8;
    --text-muted: #8888AA;
    --border: rgba(0, 212, 255, 0.15);
    --radius: 16px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 5%;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--primary);
    text-decoration: none;
    letter-spacing: -0.5px;
  }

  .nav-logo span { color: var(--text); }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--primary); }

  .nav-cta {
    background: var(--primary);
    color: #000 !important;
    padding: 0.5rem 1.25rem;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.85rem !important;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover { background: var(--primary-dark) !important; transform: scale(1.05); }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ===== SECTIONS GENERAL ===== */
  section { padding: 6rem 5%; }

  .section-label {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 1.25rem;
    letter-spacing: -1px;
  }

  .section-sub {
    font-size: 1.1rem;
    color: var(--text-muted);
    max-width: 600px;
    line-height: 1.7;
  }

  .text-center { text-align: center; }
  .text-center .section-sub { margin: 0 auto; }

  /* ===== BUTTONS ===== */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--primary);
    color: #000;
    font-weight: 700;
    font-size: 1rem;
    padding: 0.875rem 2rem;
    border-radius: 50px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(0, 212, 255, 0.3);
  }

  .btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(0, 212, 255, 0.45);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    color: var(--primary);
    font-weight: 700;
    font-size: 1rem;
    padding: 0.875rem 2rem;
    border-radius: 50px;
    text-decoration: none;
    border: 2px solid var(--primary);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }

  .btn-secondary:hover {
    background: var(--primary-glow);
    transform: translateY(-2px);
  }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-top: 6rem;
    position: relative;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(0,212,255,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(0,212,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-grid {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--primary-glow);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 0.4rem 1rem;
    font-size: 0.8rem;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 1.5rem;
  }

  .hero-badge-dot {
    width: 8px;
    height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .hero-title {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 1.5rem;
  }

  .hero-title .highlight {
    color: var(--primary);
    position: relative;
  }

  .hero-desc {
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
    line-height: 1.75;
  }

  .hero-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 2.5rem;
  }

  .hero-stats {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .hero-stat { }
  .hero-stat-num {
    font-size: 1.75rem;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  .hero-image-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .hero-image-wrap::before {
    content: '';
    position: absolute;
    width: 80%;
    height: 80%;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-img {
    width: 100%;
    max-width: 480px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    position: relative;
    z-index: 1;
    box-shadow: 0 0 60px rgba(0,212,255,0.15);
    object-fit: cover;
    aspect-ratio: 4/3;
    background: var(--bg-card);
  }

  .hero-float-card {
    position: absolute;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    z-index: 2;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .hero-float-card.top-left {
    top: 10%;
    left: -5%;
    animation: floatA 4s ease-in-out infinite;
  }

  .hero-float-card.bottom-right {
    bottom: 10%;
    right: -5%;
    animation: floatB 4s ease-in-out infinite 1s;
  }

  @keyframes floatA {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  @keyframes floatB {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  .stars { color: #FFD700; font-size: 0.9rem; }

  /* ===== PROBLEM ===== */
  #problem {
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .problem-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
  }

  .problem-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    margin-top: 2rem;
  }

  .problem-item {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1.25rem;
    background: var(--bg-card2);
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255,60,60,0.1);
    transition: border-color 0.2s;
  }

  .problem-item:hover { border-color: rgba(255,60,60,0.25); }

  .problem-icon {
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    background: rgba(255,60,60,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
  }

  .problem-text h4 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
  }

  .problem-text p {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  .problem-visual {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .stat-card {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
  }

  .stat-card-num {
    font-size: 3rem;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }

  .stat-card-label {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }

  .stat-cards-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  /* ===== SOLUTION ===== */
  #solution { max-width: 1200px; margin: 0 auto; }

  .solution-inner { max-width: 1200px; margin: 0 auto; }

  .solution-steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
    margin-top: 3rem;
  }

  .step-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }

  .step-card:hover {
    border-color: var(--primary);
    transform: translateY(-4px);
  }

    content: '';
    position: absolute;
    top:
