<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --primary-glow: rgba(0, 212, 255, 0.15);
    --bg: #0A0A0F;
    --bg2: #0f0f18;
    --bg3: #141420;
    --bg4: #1a1a2e;
    --text: #e8e8f0;
    --text-muted: #8888a8;
    --border: rgba(0, 212, 255, 0.15);
    --white: #ffffff;
    --radius: 16px;
    --radius-sm: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .nav-inner {
    max-width: 1140px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--primary);
    text-decoration: none;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--white); }
  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--primary); }
  .nav-cta {
    background: var(--primary);
    color: #000 !important;
    padding: 8px 20px;
    border-radius: 50px;
    font-weight: 700 !important;
    font-size: 0.875rem !important;
    transition: background 0.2s, transform 0.2s !important;
  }
  .nav-cta:hover { background: var(--primary-dark) !important; transform: translateY(-1px); }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }

  @media (max-width: 768px) {
    .hamburger { display: flex; }
    .nav-links {
      display: none;
      position: absolute;
      top: 64px; left: 0; right: 0;
      background: rgba(10,10,15,0.98);
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      border-bottom: 1px solid var(--border);
    }
    .nav-links.open { display: flex; }
    .nav-links a { font-size: 1rem; }
  }

  /* ─── SECTIONS ─── */
  section { padding: 96px 24px; }
  .container { max-width: 1140px; margin: 0 auto; }

  .section-tag {
    display: inline-block;
    background: var(--primary-glow);
    color: var(--primary);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px 16px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1, h2, h3 { line-height: 1.2; }

  .section-title {
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 800;
    margin-bottom: 16px;
  }
  .section-subtitle {
    font-size: 1.1rem;
    color: var(--text-muted);
    max-width: 600px;
  }

  /* ─── HERO ─── */
  #hero {
    padding-top: 140px;
    padding-bottom: 96px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #hero::before {
    content: '';
    position: absolute;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 600px;
    background: radial-gradient(ellipse at center, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 64px;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--primary-glow);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 24px;
  }
  .hero-badge .dot {
    width: 8px; height: 8px;
    background: var(--primary);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .hero-title {
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 900;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }
  .hero-title .accent { color: var(--primary); }
  .hero-desc {
    font-size: 1.15rem;
    color: var(--text-muted);
    margin-bottom: 36px;
    max-width: 520px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--primary);
    color: #000;
    font-weight: 800;
    font-size: 1rem;
    padding: 14px 32px;
    border-radius: 50px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(0,212,255,0.25);
  }
  .btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,212,255,0.35);
  }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--text);
    font-weight: 700;
    font-size: 1rem;
    padding: 14px 28px;
    border-radius: 50px;
    text-decoration: none;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, transform 0.2s;
  }
  .btn-secondary:hover {
    border-color: var(--primary);
    color: var(--primary);
    transform: translateY(-2px);
  }
  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 48px; }
  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }
  .stat-item {}
  .stat-num {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--primary);
    display: block;
  }
  .stat-label {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 500;
  }
  .hero-image-wrap {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
  }
  .hero-image-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    border: 1px solid var(--border);
    z-index: 1;
    pointer-events: none;
  }
  .hero-image-wrap img {
    width: 100%;
    height: 480px;
    object-fit: cover;
    display: block;
    border-radius: 24px;
    background: var(--bg3);
  }
  .hero-float-card {
    position: absolute;
    bottom: 24px; left: 24px;
    background: rgba(10,10,15,0.92);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    backdrop-filter: blur(12px);
    z-index: 2;
    min-width: 200px;
  }
  .hero-float-card .stars { color: #FFD700; font-size: 1rem; margin-bottom: 4px; }
  .hero-float-card .card-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
  .hero-float-card .card-sub { font-size: 0.75rem; color: var(--text-muted); }

  @media (max-width: 900px) {
    .hero-grid { grid-template-columns: 1fr; gap: 48px; }
    .hero-image-wrap { max-height: 320px; }
    .hero-image-wrap img { height: 320px; }
  }

  /* ─── PROBLEM ─── */
  #problem { background: var(--bg2); }
  .problem-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    margin-top: 48px;
  }
  .problem-card {
    background: var(--bg3);
    border: 1px solid rgba(255,80,80,0.15);
    border-radius: var(--radius);
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .problem-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #ff4444, #ff8800);
  }
  .problem-icon {
    font-size: 2.4rem;
    margin-bottom: 16px;
    display: block;
  }
  .problem-card h3 {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--white);
  }
  .problem-card p { font-size: 0.92rem; color: var(--text-muted); line-height: 1.65; }

  /* ─── SOLUTION ─── */
  #solution { background: var(--bg); }
  .solution-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 64px;
  }
  .solution-visual {
    position: relative;
    border-radius: 24px;
    background: linear-gradient(135deg, var(--bg3) 0%, var(--bg4) 100%);
    border: 1px solid var(--border);
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
  }
  .nfc-ring {
    position: relative;
    width: 180px; height: 180px;
    margin-bottom: 32px;
  }
  .nfc-ring-inner {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--primary);
    animation: ringExpand 3s infinite;
  }
  .nfc-ring-inner:nth-child(2) { animation-delay: 1s; }
  .nfc-ring-inner:nth-child(3) { animation-delay: 2s; }
  @keyframes ringExpand {
    0% { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .nfc-center {
    position: absolute;
    inset: 30px;
    background: linear-gradient(135deg, var(--primary), #0070a0);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .solution-steps { margin-top: 16px; width: 100%; }
  .solution-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    font-size: 0.88rem;
    font-weight: 600;
  }
  .solution-step-num {
    width: 28
