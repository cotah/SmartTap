<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – One Tap. Reviews Go Up. Regulars Come Back.</title>
<meta name="description" content="SmartTap helps Dublin small businesses boost Google reviews and bring customers back with NFC loyalty. €49/month.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#00D4FF;--bg:#0A0A0F;--text:#e8e8f0;--card:#12121a;--border:#1e1e2e;--cyan-dim:rgba(0,212,255,.12)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;line-height:1.6;font-size:16px}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 5%}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem}
.logo{font-size:1.25rem;font-weight:800;color:var(--cyan);letter-spacing:-.02em;white-space:nowrap}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:.9rem;color:#a0a0b8;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.btn{display:inline-block;padding:.55rem 1.3rem;border-radius:8px;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--cyan);color:#0A0A0F}
.btn-primary:hover{background:#33ddff;transform:translateY(-1px)}
.btn-outline{border:1.5px solid var(--cyan);color:var(--cyan)}
.btn-outline:hover{background:var(--cyan-dim)}

/* HERO */
.hero{padding:120px 5% 80px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.hero-badge{display:inline-block;background:var(--cyan-dim);border:1px solid rgba(0,212,255,.3);color:var(--cyan);font-size:.78rem;font-weight:600;padding:.3rem .8rem;border-radius:20px;margin-bottom:1.2rem;letter-spacing:.04em;text-transform:uppercase}
h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;line-height:1.15;letter-spacing:-.03em;margin-bottom:1rem}
h1 span{color:var(--cyan)}
.hero-sub{font-size:1.05rem;color:#a0a0b8;margin-bottom:2rem;max-width:440px}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem}
.hero-btns .btn{padding:.75rem 1.6rem;font-size:1rem}
.stats{display:flex;gap:2rem;flex-wrap:wrap}
.stat strong{display:block;font-size:1.5rem;font-weight:800;color:var(--cyan)}
.stat span{font-size:.82rem;color:#a0a0b8}
.hero-img{border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:0 0 60px rgba(0,212,255,.1)}
.hero-img img{width:100%;height:100%;object-fit:cover}

/* SECTIONS */
section{padding:80px 5%}
.section-inner{max-width:1100px;margin:0 auto}
.section-label{font-size:.78rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.75rem}
.section-title{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;letter-spacing:-.02em;margin-bottom:1rem}
.section-sub{color:#a0a0b8;font-size:1rem;max-width:540px;margin-bottom:3rem}

/* PROBLEM */
.problem{background:#0d0d14}
.cards-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.75rem}
.card-icon{font-size:2rem;margin-bottom:1rem}
.card h3{font-size:1.05rem;font-weight:700;margin-bottom:.5rem}
.card p{font-size:.9rem;color:#a0a0b8;line-height:1.6}
.card.problem-card{border-top:3px solid #ff4466}

/* SOLUTION */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.step{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.75rem;position:relative}
.step-num{width:36px;height:36px;border-radius:50%;background:var(--cyan-dim);border:1.5px solid var(--cyan);color:var(--cyan);font-weight:800;font-size:.9rem;display:flex;align-items:center;justify-content:center;margin-bottom:1rem}
.step h3{font-size:1.05rem;font-weight:700;margin-bottom:.5rem}
.step p{font-size:.9rem;color:#a0a0b8}

/* FEATURES */
.features{background:#0d0d14}
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center}
.feature-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.feature-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:1.4rem}
.feature-card:hover{border-color:rgba(0,212,255,.4)}
.feature-card h3{font-size:.95rem;font-weight:700;margin:.6rem 0 .35rem}
.feature-card p{font-size:.84rem;color:#a0a0b8;line-height:1.55}
.feat-icon{font-size:1.6rem}
.features-img{border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.features-img img{width:100%;object-fit:cover}

/* PRICING */
.pricing-wrap{display:flex;justify-content:center}
.price-card{background:var(--card);border:2px solid var(--cyan);border-radius:20px;padding:2.5rem;max-width:440px;width:100%;text-align:center;box-shadow:0 0 60px rgba(0,212,255,.1)}
.price-badge{display:inline-block;background:var(--cyan);color:#0A0A0F;font-size:.75rem;font-weight:700;padding:.25rem .75rem;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1.5rem}
.price{font-size:3.5rem;font-weight:800;color:var(--cyan);line-height:1}
.price sub{font-size:1.2rem;font-weight:600;vertical-align:bottom;margin-bottom:.2rem;display:inline-block}
.price sup{font-size:1.2rem;font-weight:600}
.price-period{color:#a0a0b8;font-size:.9rem;margin:.5rem 0 1.5rem}
.price-list{list-style:none;text-align:left;margin-bottom:2rem}
.price-list li{padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.92rem;display:flex;gap:.6rem;align-items:center}
.price-list li:last-child{border-bottom:none}
.price-list li::before{content:"✓";color:var(--cyan);font-weight:700;flex-shrink:0}
.price-card .btn{width:100%;padding:.9rem;font-size:1rem;border-radius:10px;display:block}
.price-note{margin-top:1rem;font-size:.8rem;color:#a0a0b8}

/* TESTIMONIAL */
.testimonial{background:#0d0d14}
.testi-inner{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.testi-img{border-radius:16px;overflow:hidden;border:1px solid var(--border)}
.testi-img img{width:100%;object-fit:cover}
.testi-content blockquote{font-size:1.2rem;font-style:italic;line-height:1.7;color:var(--text);margin-bottom:1.5rem;position:relative;padding-left:1.5rem}
.testi-content blockquote::before{content:'"';position:absolute;left:0;top:-.2rem;font-size:2.5rem;color:var(--cyan);font-style:normal;line-height:1}
.testi-author strong{display:block;font-weight:700}
.testi-author span{font-size:.88rem;color:#a0a0b8}
.stars{color:var(--cyan);font-size:1.1rem;margin-bottom:1rem;letter-spacing:.1em}

/* FOOTER */
footer{background:#0d0d14;border-top:1px solid var(--border);padding:3rem 5% 2rem}
.footer-inner{max-width:1100px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:2rem;margin-bottom:2.5rem}
.footer-brand p{font-size:.88rem;color:#a0a0b8;margin-top:.6rem;max-width:240px}
.footer-col h4{font-size:.85rem;font-weight:700;color:var(--cyan);margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.05em}
.footer-col ul{list-style:none}
.footer-col ul li{margin-bottom:.5rem}
.footer-col ul li a{font-size:.88rem;color:#a0a0b8;transition:color .2s}
.footer-col ul li a:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--border);padding-top:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap
