<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --primary-glow: rgba(0,212,255,0.15);
    --bg: #0A0A0F;
    --bg2: #0f0f1a;
    --bg3: #13131f;
    --card: #16161f;
    --card2: #1c1c2e;
    --text: #f0f0f8;
    --text-muted: #8888aa;
    --border: rgba(0,212,255,0.12);
    --radius: 14px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }
  a { color: var(--primary); text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 6%; height: 68px;
    background: rgba(10,10,15,0.88);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-size: 1.45rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 2rem; }
  .nav-links a { color: var(--text-muted); font-size: 0.92rem; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--primary); }
  .nav-cta {
    background: var(--primary); color: #000; font-weight: 700;
    padding: 0.5rem 1.3rem; border-radius: 8px; font-size: 0.9rem;
    transition: background 0.2s, transform 0.2s;
  }
  .nav-cta:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
  .mobile-menu { display: none; position: fixed; top: 68px; left: 0; right: 0; background: rgba(10,10,15,0.97); backdrop-filter: blur(14px); padding: 1.5rem 6%; flex-direction: column; gap: 1.2rem; border-bottom: 1px solid var(--border); z-index: 998; }
  .mobile-menu a { color: var(--text-muted); font-size: 1rem; font-weight: 500; }
  .mobile-menu a:hover { color: var(--primary); }
  .mobile-menu .nav-cta { text-align: center; color: #000; }
  .mobile-menu.open { display: flex; }

  /* HERO */
  .hero {
    min-height: 100vh; padding: 120px 6% 80px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
    background: radial-gradient(ellipse 70% 60% at 60% 40%, rgba(0,212,255,0.07) 0%, transparent 70%);
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--primary-glow); border: 1px solid var(--border);
    color: var(--primary); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
    padding: 0.35rem 0.9rem; border-radius: 50px; margin-bottom: 1.2rem; text-transform: uppercase;
  }
  .hero-eyebrow::before { content: '●'; font-size: 0.55rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero h1 {
    font-size: clamp(2rem, 4.5vw, 3.4rem); font-weight: 900; line-height: 1.12;
    letter-spacing: -1px; margin-bottom: 1.2rem;
  }
  .hero h1 .accent { color: var(--primary); }
  .hero p { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 2rem; max-width: 480px; }
  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    background: var(--primary); color: #000; font-weight: 700;
    padding: 0.85rem 2rem; border-radius: 10px; font-size: 1rem;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(0,212,255,0.3);
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 0 36px rgba(0,212,255,0.45); }
  .btn-outline {
    background: transparent; color: var(--primary); font-weight: 700;
    padding: 0.85rem 2rem; border-radius: 10px; font-size: 1rem;
    border: 1.5px solid var(--primary); transition: background 0.2s, transform 0.2s;
  }
  .btn-outline:hover { background: var(--primary-glow); transform: translateY(-2px); }
  .hero-stats { display: flex; gap: 2rem; margin-top: 2.5rem; flex-wrap: wrap; }
  .hero-stat strong { display: block; font-size: 1.6rem; font-weight: 800; color: var(--primary); }
  .hero-stat span { font-size: 0.82rem; color: var(--text-muted); }
  .hero-image { position: relative; }
  .hero-image img { border-radius: 20px; box-shadow: 0 24px 80px rgba(0,212,255,0.15); border: 1px solid var(--border); width: 100%; }
  .hero-image::before {
    content: ''; position: absolute; inset: -2px; border-radius: 22px;
    background: linear-gradient(135deg, rgba(0,212,255,0.3), transparent 60%);
    z-index: -1;
  }

  /* SECTION COMMON */
  section { padding: 90px 6%; }
  .section-label {
    display: inline-block; background: var(--primary-glow); border: 1px solid var(--border);
    color: var(--primary); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
    padding: 0.3rem 0.85rem; border-radius: 50px; margin-bottom: 1rem; text-transform: uppercase;
  }
  .section-title { font-size: clamp(1.6rem, 3.5vw, 2.4rem); font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; }
  .section-subtitle { color: var(--text-muted); font-size: 1.05rem; margin-top: 0.8rem; max-width: 560px; }
  .text-center { text-align: center; }
  .text-center .section-subtitle { margin: 0.8rem auto 0; }

  /* PROBLEM */
  .problem { background: var(--bg2); }
  .problem-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
  .problem-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.8rem; transition: border-color 0.2s, transform 0.2s;
  }
  .problem-card:hover { border-color: rgba(0,212,255,0.35); transform: translateY(-4px); }
  .problem-icon { font-size: 2rem; margin-bottom: 1rem; }
  .problem-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; }
  .problem-card p { font-size: 0.9rem; color: var(--text-muted); }

  /* SOLUTION */
  .solution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; margin-top: 3rem; }
  .solution-content .section-subtitle { max-width: 100%; }
  .solution-points { margin-top: 2rem; display: flex; flex-direction: column; gap: 1.2rem; }
  .solution-point { display: flex; gap: 1rem; align-items: flex-start; }
  .solution-point .check {
    flex-shrink: 0; width: 26px; height: 26px; background: var(--primary-glow);
    border: 1.5px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: var(--primary); font-size: 0.75rem; font-weight: 700; margin-top: 2px;
  }
  .solution-point div strong { display: block; font-size: 0.97rem; margin-bottom: 0.2rem; }
  .solution-point div span { font-size: 0.88rem; color: var(--text-muted); }
  .solution-visual img { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,212,255,0.12); border: 1px solid var(--border); }

  /* FEATURES */
  .features { background: var(--bg3); }
  .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; margin-top: 3rem; }
  .features-image img { border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,212,255,0.12); }
  .features-list { display: flex; flex-direction: column; gap: 1.5rem; }
  .feature-item {
    display: flex; gap: 1.2rem; align-items: flex-start;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.4rem; transition: border-color 0.2s, transform 0.2s;
  }
  .feature-item:hover { border-color: rgba(0,212,255,0.4); transform: translateX(4px); }
  .feature-icon { font-size: 1.6rem; flex-shrink: 0; width: 48px; height: 48px; background: var(--primary-glow); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .feature-item h3 { font-size: 0.98rem; font-weight: 700; margin-bottom: 0.3rem; }
  .feature-item p { font-size: 0.86rem; color: var(--text-muted); }

  /* PRICING */
  .pricing { background: var(--bg2); }
  .pricing-wrapper { max-width: 520px; margin: 3rem auto 0; }
  .pricing-card {
    background: var(--card2); border: 2px solid var(--primary); border-radius: 20px;
    padding: 2.8rem; text-align: center; position: relative;
    box-shadow: 0 0 60px rgba(0,212,255,0.1);
  }
  .pricing-badge {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    background: var(--primary); color: #000; font-size: 0.78rem; font-weight: 800;
    padding: 0.3rem 1.2rem; border-radius: 50px; letter-spacing: 0.05em; white-space: nowrap;
  }
  .pricing-plan { font-size: 0.85rem; font-weight: 700; color: var(--primary); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.8rem; }
  .pricing-amount { font-size: 3.5rem; font-weight: 900; line-height: 1; color: var(--text); }
  .pricing-amount sup { font-size: 1.5rem; font-weight: 700; vertical-align: top; margin-top: 0.6rem; display: inline-block; }
  .pricing-amount sub { font-size: 1rem; font-weight: 400; color: var(--text-muted); }
  .pricing-desc { font-size: 0.9rem; color: var(--text-muted); margin: 0.8rem 0 2rem; }
  .pricing-features { list-style: none; text-align: left; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 0.9rem; }
  .pricing-features li { display: flex; align-items: center; gap: 0.75rem; font-size: 0.93rem; }
  .pricing-features li::before { content: '✓'; color: var(--primary); font-weight: 800; font-size: 0.85rem; flex-shrink: 0; background: var(--primary-glow); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .pricing-cta {
    display: block; background: var(--primary); color: #000; font-weight: 800;
    padding: 1rem; border-radius: 12px; font-size: 1.05rem;
    transition: background 0.2s, transform 0.2s
