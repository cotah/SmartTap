<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D4FF;
            --primary-dark: #00a8cc;
            --primary-glow: rgba(0, 212, 255, 0.15);
            --bg: #0A0A0F;
            --bg-card: #12121A;
            --bg-card2: #1A1A28;
            --text: #FFFFFF;
            --text-muted: #8888AA;
            --border: rgba(0, 212, 255, 0.15);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== NAV ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 5%;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 68px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-cta {
            background: var(--primary);
            color: #0A0A0F !important;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-weight: 700 !important;
            transition: background 0.2s, transform 0.2s !important;
        }

        .nav-cta:hover {
            background: var(--primary-dark) !important;
            transform: translateY(-1px);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 24px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* ===== HERO ===== */
        #hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 100px 5% 60px;
            position: relative;
            overflow: hidden;
        }

        .hero-glow {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-glow-left {
            position: absolute;
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            width: 100%;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-glow);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.35rem 1rem;
            font-size: 0.8rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .hero-badge .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero-title {
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
        }

        .hero-title .accent {
            color: var(--primary);
            display: block;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 480px;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #0A0A0F;
            padding: 0.9rem 2rem;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            padding: 0.9rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .hero-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .hero-stat {
            text-align: left;
        }

        .hero-stat strong {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            display: block;
        }

        .hero-stat span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .hero-image-wrap {
            position: relative;
        }

        .hero-image-wrap img {
            width: 100%;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: block;
            background: var(--bg-card2);
            min-height: 400px;
            object-fit: cover;
        }

        .hero-float-card {
            position: absolute;
            bottom: -20px;
            left: -20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            backdrop-filter: blur(10px);
        }

        .hero-float-card .icon {
            font-size: 2rem;
        }

        .hero-float-card strong {
            display: block;
            font-size: 0.9rem;
        }

        .hero-float-card span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .hero-float-card2 {
            position: absolute;
            top: -20px;
            right: -20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.75rem 1rem;
            backdrop-filter: blur(10px);
        }

        .stars {
            color: #FFD700;
            font-size: 0.9rem;
        }

        .review-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* ===== SECTIONS COMMON ===== */
        section {
            padding: 90px 5%;
        }

        .section-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
        }

        .section-title {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 1.25rem;
        }

        .section-subtitle {
            font-size: 1.05rem;
            color: var(--text-muted);
            max-width: 560px;
        }

        /* ===== PROBLEM ===== */
        #problem {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .problem-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .problem-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }

        .problem-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,60,60,0.6), transparent);
        }

        .problem-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 100, 100, 0.3);
        }

        .problem-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .problem-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .problem-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ===== SOLUTION ===== */
        #solution {
            background: var(--bg);
        }

        .solution-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            margin-top: 3rem;
        }

        .solution-steps {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .solution-step {
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
        }

        .step-num {
            width: 44px;
            height: 44px;
            min-width: 44px;
            background: var(--primary-glow);
            border: 1px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: var(--primary);
            font-size: 1rem;
        }

        .step-text h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .step-text p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .solution-visual {
            background: var(--bg-card2);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .solution-visual img {
            width: 100%;
            display: block;
            min-height: 420px;
            object-fit: cover;
            background: var(--bg-card2);
        }

        .solution-tag {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary);
            color: #0A0A0F;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.3rem 0.75rem;
            border-radius: 50px;
        }

        /* ===== FEATURES ===== */
        #features {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .features-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .features-header .section-subtitle {
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .feature
