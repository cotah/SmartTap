<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --primary-glow: rgba(0,212,255,0.2);
    --bg: #0A0A0F;
    --bg2: #0f0f1a;
    --bg3: #13131f;
    --card: #141420;
    --card2: #1a1a2e;
    --text: #f0f0f0;
    --muted: #8888aa;
    --border: rgba(0,212,255,0.15);
    --radius: 14px;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; line-height: 1.6; overflow-x: hidden; }
  a { color: var(--primary); text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 2rem; align-items: center; }
  .nav-links a { color: var(--muted); font-size: 0.95rem; transition: color 0.2s; }
  .nav-links a:hover { color: var(--primary); }
  .nav-cta { background: var(--primary); color: #000 !important; padding: 0.5rem 1.25rem; border-radius: 8px; font-weight: 700; font-size: 0.9rem !important; transition: background 0.2s, transform 0.2s !important; }
  .nav-cta:hover { background: var(--primary-dark) !important; transform: translateY(-1px); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }
  .mobile-menu { display: none; position: fixed; top: 65px; left: 0; right: 0; background: rgba(10,10,15,0.97); backdrop-filter: blur(14px); padding: 1.5rem 2rem; flex-direction: column; gap: 1.25rem; border-bottom: 1px solid var(--border); z-index: 99; }
  .mobile-menu a { color: var(--muted); font-size: 1.05rem; padding: 0.3rem 0; }
  .mobile-menu a:hover { color: var(--primary); }
  .mobile-menu .nav-cta { text-align: center; padding: 0.75rem; border-radius: 10px; }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding: 7rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 1200px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--primary-glow); border: 1px solid var(--border);
    color: var(--primary); font-size: 0.8rem; font-weight: 600;
    padding: 0.35rem 0.85rem; border-radius: 999px; margin-bottom: 1.5rem;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .hero-badge::before { content: '●'; font-size: 0.55rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .hero h1 { font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 900; line-height: 1.15; margin-bottom: 1.25rem; letter-spacing: -1px; }
  .hero h1 span { color: var(--primary); }
  .hero p { font-size: 1.1rem; color: var(--muted); margin-bottom: 2rem; max-width: 480px; }
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    background: var(--primary); color: #000; font-weight: 700; font-size: 1rem;
    padding: 0.85rem 2rem; border-radius: 10px; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 20px rgba(0,212,255,0.3);
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,212,255,0.45); }
  .btn-secondary {
    background: transparent; color: var(--text); font-weight: 600; font-size: 1rem;
    padding: 0.85rem 2rem; border-radius: 10px; border: 1px solid var(--border);
    cursor: pointer; transition: border-color 0.2s, transform 0.2s, background 0.2s;
  }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-glow); transform: translateY(-2px); }
  .hero-stats { display: flex; gap: 2rem; margin-top: 2.5rem; flex-wrap: wrap; }
  .stat { text-align: left; }
  .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: 0.8rem; color: var(--muted); }
  .hero-img-wrap {
    position: relative; border-radius: 20px; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,212,255,0.15);
    border: 1px solid var(--border);
  }
  .hero-img-wrap::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-img-wrap img { width: 100%; height: 480px; object-fit: cover; }

  /* SECTION SHARED */
  section { padding: 5rem 2rem; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-tag { color: var(--primary); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.75rem; }
  .section-title { font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 800; line-height: 1.2; margin-bottom: 1rem; letter-spacing: -0.5px; }
  .section-title span { color: var(--primary); }
  .section-sub { color: var(--muted); font-size: 1.05rem; max-width: 560px; }
  .text-center { text-align: center; }
  .text-center .section-sub { margin: 0 auto; }

  /* PROBLEM */
  .problem { background: var(--bg2); }
  .problem-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
  .problem-card {
    background: var(--card); border: 1px solid rgba(255,80,80,0.12);
    border-radius: var(--radius); padding: 1.75rem;
    transition: transform 0.2s, border-color 0.2s;
  }
  .problem-card:hover { transform: translateY(-4px); border-color: rgba(255,80,80,0.3); }
  .problem-icon { font-size: 2rem; margin-bottom: 1rem; }
  .problem-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.6rem; }
  .problem-card p { color: var(--muted); font-size: 0.92rem; }

  /* SOLUTION */
  .solution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; margin-top: 3rem; }
  .solution-list { display: flex; flex-direction: column; gap: 1.5rem; }
  .solution-item { display: flex; gap: 1rem; align-items: flex-start; }
  .solution-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--primary-glow); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .solution-item h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.3rem; }
  .solution-item p { color: var(--muted); font-size: 0.9rem; }
  .solution-img-wrap {
    border-radius: 20px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(0,212,255,0.1);
  }
  .solution-img-wrap img { width: 100%; height: 400px; object-fit: cover; }

  /* FEATURES */
  .features { background: var(--bg2); }
  .features-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; margin-top: 3rem; }
  .features-img-wrap {
    border-radius: 20px; overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(0,212,255,0.1);
    order: -1;
  }
  .features-img-wrap img { width: 100%; height: 440px; object-fit: cover; }
  .features-list { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .feature-card {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .feature-card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 0 20px rgba(0,212,255,0.1); }
  .feature-emoji { font-size: 1.6rem; margin-bottom: 0.6rem; }
  .feature-card h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; }
  .feature-card p { font-size: 0.82rem; color: var(--muted); }

  /* PRICING */
  .pricing-wrap { display: flex; justify-content: center; margin-top: 3rem; }
  .pricing-card {
    background: var(--card2); border: 2px solid var(--primary);
    border-radius: 20px; padding: 3rem 2.5rem;
    max-width: 460px; width: 100%;
    box-shadow: 0 0 60px rgba(0,212,255,0.15);
    position: relative; overflow: hidden;
  }
  .pricing-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--primary), #7b2fff);
  }
  .pricing-badge {
    display: inline-block; background: var(--primary); color: #000;
    font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; padding: 0.3rem 0.8rem; border-radius: 999px;
    margin-bottom: 1.5rem;
  }
  .pricing-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.5rem; }
  .pricing-amount { font-size: 3.8rem; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 0.25rem; }
  .pricing-amount sup { font-size: 1.5rem; vertical-align: super; }
  .pricing-period { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 2.5rem; }
  .pricing-features li { display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
  .pricing-features li::before { content: '✓'; color: var(--primary); font-weight: 800; font-size: 1rem; }
