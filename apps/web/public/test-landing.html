<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --bg: #0A0A0F;
    --bg2: #111118;
    --bg3: #16161f;
    --text: #e8e8f0;
    --muted: #8888aa;
    --border: rgba(0,212,255,0.15);
    --radius: 16px;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; line-height: 1.6; overflow-x: hidden; }
  a { color: var(--primary); text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { color: var(--text); font-size: 0.9rem; transition: color 0.2s; }
  .nav-links a:hover { color: var(--primary); }
  .nav-cta {
    background: var(--primary); color: #0A0A0F; font-weight: 700;
    padding: 0.55rem 1.4rem; border-radius: 50px; font-size: 0.9rem;
    transition: background 0.2s, transform 0.2s;
  }
  .nav-cta:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
  .mobile-menu { display: none; }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center;
    padding: 7rem 2rem 4rem;
    position: relative; overflow: hidden;
  }
  .hero-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; width: 100%; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(0,212,255,0.1); border: 1px solid var(--border);
    color: var(--primary); font-size: 0.8rem; font-weight: 600;
    padding: 0.4rem 1rem; border-radius: 50px; margin-bottom: 1.5rem;
  }
  .hero-badge::before { content: ''; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .hero-title { font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; }
  .hero-title span { color: var(--primary); }
  .hero-sub { font-size: 1.1rem; color: var(--muted); margin-bottom: 2.5rem; max-width: 480px; }
  .btn-primary {
    display: inline-block; background: var(--primary); color: #0A0A0F;
    font-weight: 800; padding: 1rem 2.2rem; border-radius: 50px;
    font-size: 1rem; transition: all 0.2s; border: none; cursor: pointer;
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.3); }
  .btn-outline {
    display: inline-block; background: transparent; color: var(--primary);
    font-weight: 700; padding: 1rem 2.2rem; border-radius: 50px;
    font-size: 1rem; border: 2px solid var(--primary); margin-left: 1rem;
    transition: all 0.2s; cursor: pointer;
  }
  .btn-outline:hover { background: rgba(0,212,255,0.1); }
  .hero-stats { display: flex; gap: 2rem; margin-top: 2.5rem; }
  .stat { }
  .stat-num { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
  .stat-label { font-size: 0.8rem; color: var(--muted); }
  .hero-img { border-radius: var(--radius); overflow: hidden; position: relative; }
  .hero-img img { width: 100%; height: auto; border-radius: var(--radius); box-shadow: 0 30px 80px rgba(0,212,255,0.2); }
  .hero-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%); pointer-events: none; }

  /* SECTION COMMON */
  section { padding: 6rem 2rem; }
  .container { max-width: 1200px; margin: 0 auto; }
  .section-tag { display: inline-block; background: rgba(0,212,255,0.1); color: var(--primary); font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 0.4rem 1rem; border-radius: 50px; margin-bottom: 1rem; border: 1px solid var(--border); }
  .section-title { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; line-height: 1.2; margin-bottom: 1rem; }
  .section-title span { color: var(--primary); }
  .section-sub { color: var(--muted); font-size: 1rem; max-width: 600px; }
  .text-center { text-align: center; }
  .mx-auto { margin-left: auto; margin-right: auto; }

  /* PROBLEM */
  #problem { background: var(--bg2); }
  .problem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-top: 3rem; }
  .problem-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 2rem; text-align: center; transition: transform 0.3s;
  }
  .problem-card:hover { transform: translateY(-4px); }
  .problem-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .problem-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
  .problem-card p { color: var(--muted); font-size: 0.9rem; }

  /* SOLUTION */
  #solution { background: var(--bg); }
  .solution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .solution-list { margin-top: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .solution-item { display: flex; gap: 1rem; align-items: flex-start; }
  .solution-icon { width: 44px; height: 44px; background: rgba(0,212,255,0.1); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
  .solution-item h4 { font-weight: 700; margin-bottom: 0.25rem; }
  .solution-item p { color: var(--muted); font-size: 0.9rem; }

  /* FEATURES */
  #features { background: var(--bg2); }
  .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; margin-top: 3rem; }
  .features-img { border-radius: var(--radius); overflow: hidden; }
  .features-img img { width: 100%; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,212,255,0.15); }
  .features-list { display: flex; flex-direction: column; gap: 1.2rem; }
  .feature-item {
    display: flex; gap: 1rem; align-items: flex-start;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem; transition: border-color 0.2s, transform 0.2s;
  }
  .feature-item:hover { border-color: var(--primary); transform: translateX(4px); }
  .feature-num { width: 36px; height: 36px; background: var(--primary); color: #0A0A0F; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; flex-shrink: 0; }
  .feature-item h4 { font-weight: 700; margin-bottom: 0.2rem; font-size: 0.95rem; }
  .feature-item p { color: var(--muted); font-size: 0.85rem; }

  /* PRICING */
  #pricing { background: var(--bg); }
  .pricing-wrap { display: flex; justify-content: center; margin-top: 3rem; }
  .pricing-card {
    background: var(--bg3); border: 2px solid var(--primary);
    border-radius: 24px; padding: 3rem; max-width: 460px; width: 100%;
    text-align: center; position: relative; overflow: hidden;
  }
  .pricing-card::before { content: 'MOST POPULAR'; position: absolute; top: 1.2rem; right: -2rem; background: var(--primary); color: #0A0A0F; font-size: 0.7rem; font-weight: 800; padding: 0.3rem 3rem; transform: rotate(45deg); letter-spacing: 1px; }
  .pricing-price { font-size: 4rem; font-weight: 900; color: var(--primary); line-height: 1; margin: 1.5rem 0 0.5rem; }
  .pricing-price sup { font-size: 1.5rem; vertical-align: super; }
  .pricing-period { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .pricing-features { list-style: none; margin-bottom: 2.5rem; text-align: left; display: flex; flex-direction: column; gap: 0.9rem; }
  .pricing-features li { display: flex; align-items: center; gap: 0.75rem; font-size: 0.95rem; }
  .pricing-features li::before { content: '✓'; width: 22px; height: 22px; background: rgba(0,212,255,0.15); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900; flex-shrink: 0; }
  .pricing-note { color: var(--muted); font-size: 0.8rem; margin-top: 1rem; }
  .pricing-glow { position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%); width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%); pointer-events: none; }

  /* TESTIMONIALS */
  #testimonials { background: var(--bg2); }
  .testi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; margin-top: 3rem; }
  .testi-img { border-radius: var(--radius); overflow: hidden; }
  .testi-img img { width: 100%; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .testi-cards { display: flex; flex-direction: column; gap: 1.5rem; }
  .testi-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.8rem; position: relative;
    transition: transform 0.3s, border-color 0.3s;
  }
  .testi-card:hover { transform: translateY(-3px); border-color: var(--primary); }
  .testi-stars { color: #FFD700; font-size: 0.9rem; margin-bottom: 0.75rem; letter-spacing: 2px; }
  .testi-text { color: var(--text); font-size: 0.95rem; line-height: 1.7; margin-bottom: 1rem; font-style: italic; }
  .testi-author { display: flex; align-items: center; gap: 0.75rem; }
  .testi-avatar { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size:
