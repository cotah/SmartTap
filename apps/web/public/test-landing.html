<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --primary-glow: rgba(0,212,255,0.15);
    --bg: #0A0A0F;
    --bg2: #111118;
    --bg3: #16161f;
    --text: #f0f0f8;
    --muted: #8888aa;
    --border: rgba(0,212,255,0.15);
    --radius: 12px;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; line-height: 1.6; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(10,10,15,0.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a { font-size: 0.9rem; color: var(--muted); transition: color 0.2s; }
  .nav-links a:hover { color: var(--primary); }
  .nav-cta {
    background: var(--primary); color: var(--bg); font-weight: 700; font-size: 0.85rem;
    padding: 9px 20px; border-radius: 8px; transition: background 0.2s, transform 0.2s;
  }
  .nav-cta:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .hamburger span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }
  .mobile-menu {
    display: none; position: fixed; top: 64px; left: 0; right: 0; z-index: 999;
    background: rgba(10,10,15,0.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 20px 24px;
    flex-direction: column; gap: 16px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { font-size: 1rem; color: var(--muted); padding: 8px 0; border-bottom: 1px solid var(--border); }
  .mobile-menu a:last-child { border-bottom: none; color: var(--primary); font-weight: 700; }

  /* SECTIONS */
  section { padding: 80px 24px; }
  .container { max-width: 1100px; margin: 0 auto; }
  .section-tag {
    display: inline-block; background: var(--primary-glow); border: 1px solid var(--border);
    color: var(--primary); font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 16px;
  }
  h1, h2, h3 { line-height: 1.2; }
  h2 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800; margin-bottom: 16px; }
  .accent { color: var(--primary); }

  /* HERO */
  #hero {
    min-height: 100vh; padding-top: 80px;
    display: flex; align-items: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 70%);
    position: relative; overflow: hidden;
  }
  #hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 50%, rgba(0,212,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-inner {
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
    max-width: 1100px; margin: 0 auto; width: 100%;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--primary-glow); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px; margin-bottom: 20px;
    font-size: 0.82rem; color: var(--primary); font-weight: 600;
  }
  .hero-badge .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  h1 { font-size: clamp(2.2rem, 5vw, 3.4rem); font-weight: 900; margin-bottom: 20px; letter-spacing: -1px; }
  .hero-sub { font-size: 1.1rem; color: var(--muted); margin-bottom: 36px; max-width: 480px; }
  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--primary); color: var(--bg); font-weight: 800; font-size: 1rem;
    padding: 14px 30px; border-radius: var(--radius); border: none; cursor: pointer;
    transition: all 0.2s; display: inline-block;
    box-shadow: 0 0 30px rgba(0,212,255,0.3);
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 0 40px rgba(0,212,255,0.45); }
  .btn-outline {
    border: 1.5px solid var(--border); color: var(--text); font-weight: 700; font-size: 1rem;
    padding: 14px 30px; border-radius: var(--radius); cursor: pointer;
    transition: all 0.2s; display: inline-block; background: transparent;
  }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
  .hero-stats { display: flex; gap: 32px; margin-top: 40px; flex-wrap: wrap; }
  .stat { }
  .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .hero-img-wrap {
    position: relative; border-radius: 20px; overflow: hidden;
    box-shadow: 0 0 80px rgba(0,212,255,0.15), 0 40px 80px rgba(0,0,0,0.5);
  }
  .hero-img-wrap::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-img-wrap img { width: 100%; height: auto; border-radius: 20px; }
  .glow-ring {
    position: absolute; border-radius: 50%; border: 1px solid rgba(0,212,255,0.1);
    animation: spin 20s linear infinite; pointer-events: none;
  }

  /* PROBLEM */
  #problem { background: var(--bg2); }
  .problem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
  .problem-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px; transition: transform 0.2s, box-shadow 0.2s;
  }
  .problem-card:hover { transform: translateY(-4px); box-shadow: 0 8px 40px rgba(0,212,255,0.08); }
  .problem-icon { font-size: 2rem; margin-bottom: 14px; }
  .problem-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
  .problem-card p { font-size: 0.9rem; color: var(--muted); }

  /* SOLUTION */
  #solution {
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  }
  .solution-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  .solution-list { margin-top: 24px; display: flex; flex-direction: column; gap: 16px; }
  .solution-item { display: flex; gap: 14px; align-items: flex-start; }
  .solution-check {
    width: 24px; height: 24px; min-width: 24px; background: var(--primary-glow);
    border: 1px solid var(--primary); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; color: var(--primary); margin-top: 2px;
  }
  .solution-item-text h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 3px; }
  .solution-item-text p { font-size: 0.87rem; color: var(--muted); }
  .solution-visual {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
    padding: 32px; position: relative; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,212,255,0.08);
  }
  .solution-visual::before {
    content: ''; position: absolute; top: -40%; right: -20%;
    width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .nfc-demo { text-align: center; padding: 20px 0; }
  .nfc-circle {
    width: 120px; height: 120px; border-radius: 50%;
    background: var(--primary-glow); border: 2px solid var(--primary);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 2.5rem;
    box-shadow: 0 0 40px rgba(0,212,255,0.2);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .nfc-demo p { color: var(--muted); font-size: 0.9rem; }
  .nfc-demo strong { color: var(--primary); display: block; font-size: 1.1rem; margin-top: 8px; }
  .flow-steps { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
  .flow-step {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; font-size: 0.78rem; color: var(--text); font-weight: 600;
  }
  .flow-arrow { color: var(--primary); font-size: 0.9rem; }

  /* FEATURES */
  #features { background: var(--bg); }
  .features-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  .features-img-wrap {
    border-radius: 20px; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,212,255,0.12), 0 30px 60px rgba(0,0,0,0.4);
    border: 1px solid var(--border);
  }
  .features-img-wrap img { width: 100%; height: auto; }
  .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
  .feature-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; transition: all 0.2s;
  }
  .feature-card:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,212,255,0.1); transform: translateY(-2px); }
  .feature-icon { font-size: 1.5rem; margin-bottom: 10px; }
  .feature-card h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; }
  .feature-card p { font-size: 0.8rem; color: var(--muted); }

  /* PRICING */
  #pricing { background: var(--bg2); }
  .pricing-center { text-align: center; max-width: 600px; margin: 0 auto; }
  .pricing-card {
