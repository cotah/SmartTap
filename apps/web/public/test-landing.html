<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTap – NFC Loyalty & Google Reviews for Dublin Businesses</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #00D4FF;
    --primary-dark: #00a8cc;
    --bg: #0A0A0F;
    --bg2: #0f0f1a;
    --bg3: #141420;
    --text: #e8e8f0;
    --text-muted: #8888aa;
    --border: rgba(0,212,255,0.15);
    --card: rgba(255,255,255,0.04);
    --glow: 0 0 40px rgba(0,212,255,0.2);
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }
  a { color: var(--primary); text-decoration: none; }
  img { max-width: 100%; display: block; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
    color: var(--primary);
  }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a { color: var(--text-muted); font-size: 0.9rem; transition: color 0.2s; }
  .nav-links a:hover { color: var(--primary); }
  .nav-cta {
    background: var(--primary); color: #000 !important;
    padding: 8px 20px; border-radius: 8px; font-weight: 700 !important;
    font-size: 0.85rem !important; transition: background 0.2s, transform 0.2s !important;
  }
  .nav-cta:hover { background: var(--primary-dark) !important; transform: translateY(-1px); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
  .mobile-menu {
    display: none; position: fixed; top: 64px; left: 0; right: 0; z-index: 99;
    background: rgba(10,10,15,0.97); backdrop-filter: blur(12px);
    padding: 24px; flex-direction: column; gap: 16px;
    border-bottom: 1px solid var(--border);
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { color: var(--text); font-size: 1.1rem; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .mobile-menu a:last-child { border-bottom: none; }

  /* BUTTONS */
  .btn-primary {
    display: inline-block;
    background: var(--primary);
    color: #000;
    font-weight: 700;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 1rem;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    cursor: pointer; border: none;
  }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.35); }
  .btn-outline {
    display: inline-block;
    background: transparent;
    color: var(--primary);
    font-weight: 700;
    padding: 14px 32px;
    border-radius: 10px;
    font-size: 1rem;
    border: 2px solid var(--primary);
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }
  .btn-outline:hover { background: rgba(0,212,255,0.1); transform: translateY(-2px); }

  /* SECTIONS */
  section { padding: 80px 24px; }
  .container { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--primary); margin-bottom: 12px;
  }
  .section-title {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800; line-height: 1.2; margin-bottom: 16px;
  }
  .section-subtitle {
    font-size: 1.05rem; color: var(--text-muted); max-width: 560px;
  }

  /* HERO */
  #hero {
    padding-top: 140px; padding-bottom: 80px;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 70%);
    min-height: 100vh; display: flex; align-items: center;
  }
  .hero-inner {
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3);
    padding: 6px 16px; border-radius: 50px; font-size: 0.82rem; color: var(--primary);
    margin-bottom: 24px; font-weight: 600;
  }
  .hero-badge::before { content: '●'; font-size: 0.5rem; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .hero-title {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 900; line-height: 1.1; margin-bottom: 20px;
    letter-spacing: -1px;
  }
  .hero-title .accent { color: var(--primary); }
  .hero-desc { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 36px; max-width: 480px; }
  .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 40px; }
  .hero-stats { display: flex; gap: 32px; flex-wrap: wrap; }
  .stat { }
  .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
  .stat-label { font-size: 0.82rem; color: var(--text-muted); }
  .hero-image-wrap {
    position: relative;
  }
  .hero-image-wrap::before {
    content: '';
    position: absolute; inset: -20px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.15) 0%, transparent 70%);
    border-radius: 50%; z-index: 0;
  }
  .hero-image-wrap img {
    position: relative; z-index: 1;
    border-radius: 20px;
    box-shadow: 0 20px 80px rgba(0,212,255,0.2);
  }

  /* PROBLEM */
  #problem {
    background: var(--bg2);
  }
  .problem-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px; margin-top: 48px;
  }
  .problem-card {
    background: var(--card);
    border: 1px solid rgba(255,80,80,0.15);
    border-radius: 16px; padding: 28px;
    position: relative; overflow: hidden;
  }
  .problem-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #ff4444, #ff8800);
  }
  .problem-icon { font-size: 2rem; margin-bottom: 16px; }
  .problem-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
  .problem-card p { font-size: 0.9rem; color: var(--text-muted); }

  /* SOLUTION */
  #solution {
    background: var(--bg3);
  }
  .solution-inner {
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }
  .solution-points { margin-top: 32px; display: flex; flex-direction: column; gap: 20px; }
  .solution-point {
    display: flex; gap: 16px; align-items: flex-start;
  }
  .sol-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(0,212,255,0.12); border: 1px solid rgba(0,212,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .sol-text h4 { font-size: 0.98rem; font-weight: 700; margin-bottom: 4px; }
  .sol-text p { font-size: 0.88rem; color: var(--text-muted); }
  .solution-visual {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .solution-visual::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .tap-animation {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, var(--primary), #0088aa);
    border-radius: 50%; margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
    box-shadow: 0 0 40px rgba(0,212,255,0.4);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
  .solution-visual h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
  .solution-visual p { font-size: 0.9rem; color: var(--text-muted); }

  /* FEATURES */
  #features { background: var(--bg); }
  .features-header { text-align: center; margin-bottom: 60px; }
  .features-header .section-subtitle { margin: 0 auto; }
  .features-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center;
    margin-bottom: 60px;
  }
  .features-image img {
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,212,255,0.15);
    border: 1px solid var(--border);
  }
  .features-list { display: flex; flex-direction: column; gap: 24px; }
  .feature-item {
    display: flex; gap: 16px; align-items: flex-start;
    padding: 20px; background: var(--card);
    border: 1px solid var(--border); border-radius: 14px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .feature-item:hover { border-color: rgba(0,212,255,0.4); transform: translateX(4px); }
  .feature-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.05));
    border: 1px solid rgba(0,212,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; flex-shrink: 0;
  }
  .feature-text h4 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .feature-text p { font-size: 0.88rem; color: var(--text-muted); }
  .features-bottom {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
  }
  .feature-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }
  .feature-card:hover { border-color: rgba(0,212,255,0.4); transform: translateY(-4px); }
  .feature-card-icon { font-size: 2rem; margin-bottom: 12px; }
  .feature-card h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
  .feature-card p { font-size: 0.83rem; color: var(--text-muted); }

  #pricing {
    background: var(--bg2);
